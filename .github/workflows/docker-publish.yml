name: Build And Publish Backend Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            set -e

            APP_NAME="vestar"
            NEXT_NAME="vestar-next"
            IMAGE="ghcr.io/vestar-bay/vestar-backend:latest"
            ENV_FILE="/home/ec2-user/.env"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull $IMAGE

            docker rm -f $NEXT_NAME || true

            docker run -d \
              --name $NEXT_NAME \
              --restart unless-stopped \
              --env-file $ENV_FILE \
              -p 3001:3000 \
              $IMAGE

            sleep 8

            docker ps | grep $NEXT_NAME
            docker logs --tail 100 $NEXT_NAME

            curl -f http://127.0.0.1:3001/elections || (docker logs $NEXT_NAME && exit 1)

            docker stop $APP_NAME || true
            docker rm $APP_NAME || true

            docker stop $NEXT_NAME
            docker rm $NEXT_NAME

            docker run -d \
              --name $APP_NAME \
              --restart unless-stopped \
              --env-file $ENV_FILE \
              -p 3000:3000 \
              $IMAGE

            sleep 8

            docker ps | grep $APP_NAME
            docker logs --tail 100 $APP_NAME

            curl -f http://127.0.0.1:3000/elections || (docker logs $APP_NAME && exit 1)

            docker image prune -f
